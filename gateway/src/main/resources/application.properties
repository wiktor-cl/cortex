spring.application.name=gateway

# Spring Boot 4 defaults to Jackson 3 (tools.jackson); this gateway's DTOs, jjwt-jackson, and
# springdoc-openapi all still target classic Jackson 2 (com.fasterxml.jackson), so the classic
# ObjectMapper is selected explicitly rather than migrating everything to the new package.
spring.http.converters.preferred-json-mapper=jackson
spring.http.codecs.preferred-json-mapper=jackson

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cortex}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cortex}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cortex}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

cortex.jwt.secret=${CORTEX_JWT_SECRET:dev-only-secret-please-override-in-production-min-32-bytes!!}
cortex.jwt.validity-minutes=${CORTEX_JWT_VALIDITY_MINUTES:60}

cortex.internal.api-key=${CORTEX_INTERNAL_API_KEY:change-me-internal-key}

cortex.cors.allowed-origins=${CORTEX_CORS_ALLOWED_ORIGINS:http://localhost:5173}

cortex.ai-service.base-url=${CORTEX_AI_SERVICE_BASE_URL:http://localhost:8001}

cortex.uploads.dir=${CORTEX_UPLOADS_DIR:./data/uploads}

cortex.rate-limit.max-requests=${CORTEX_RATE_LIMIT_MAX_REQUESTS:60}
cortex.rate-limit.window-seconds=${CORTEX_RATE_LIMIT_WINDOW_SECONDS:60}

cortex.admin.email=${CORTEX_ADMIN_EMAIL:admin@cortex.local}
cortex.admin.password=${CORTEX_ADMIN_PASSWORD:changeme123}
